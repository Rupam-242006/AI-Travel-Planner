<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Travel Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="travel.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">

    <div class="max-w-4xl mx-auto p-6">
        <header class="text-center my-8">
            <h1 class="text-4xl font-extrabold text-indigo-600 tracking-tight">🌍 AI Travel Planner</h1>
            <p class="text-gray-500 mt-2">Generate custom itineraries tailored to your vibe instantly.</p>
        </header>

        <div class="bg-white rounded-xl shadow-md p-6 mb-8">
            <form id="plannerForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Where to?</label>
                    <input type="text" id="destination" placeholder="e.g., Paris, France" required
                        class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">How many days?</label>
                    <input type="number" id="duration" min="1" max="14" value="3" required
                        class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Budget level</label>
                    <select id="budget" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-indigo-500 outline-none">
                        <option value="Backpacker / Budget">Backpacker (Budget)</option>
                        <option value="Moderate" selected>Moderate / Standard</option>
                        <option value="Luxury">Luxury</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Trip Vibe / Interests</label>
                    <input type="text" id="vibe" placeholder="e.g., Museums, cafes, hidden gems"
                        class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div class="md:col-span-2 mt-2">
                    <button type="submit" id="submitBtn"
                        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold p-3 rounded-lg shadow transition duration-200">
                        Generate Itinerary ✨
                    </button>
                </div>
            </form>
        </div>

        <div id="loading" class="hidden text-center my-12">
            <div class="loading-spinner mx-auto mb-4"></div>
            <p class="text-indigo-600 font-medium">Mapping out your adventure... Please wait.</p>
        </div>

        <div id="resultContainer" class="hidden space-y-8">
            <h2 id="tripTitle" class="text-2xl font-bold text-gray-900 border-b pb-2"></h2>
            <div id="itineraryTimeline" class="space-y-6"></div>
        </div>
    </div>

    <script src="travel.js"></script>
</body>
</html>
